# ============================================================
#  HRMS Docker Compose — 一键部署
#  使用: docker compose up -d --build
# ============================================================

services:
  # ---------- PostgreSQL ----------
  db:
    image: postgres:16-alpine
    container_name: hrms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE:-hrms}
      POSTGRES_USER: ${PG_USERNAME:-hrms}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-hrms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5432}:5432"
    networks:
      - hrms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USERNAME:-hrms} -d ${PG_DATABASE:-hrms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Backend (Spring Boot) ----------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrms-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-pg}
      HRMS_AES_KEY: ${HRMS_AES_KEY}
      JWT_SECRET: ${JWT_SECRET}
      HRMS_DB_URL: jdbc:postgresql://db:5432/${PG_DATABASE:-hrms}
      HRMS_DB_USERNAME: ${PG_USERNAME:-hrms}
      HRMS_DB_PASSWORD: ${PG_PASSWORD:-hrms}
      HRMS_CORS_ALLOWED_ORIGINS: ${HRMS_CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      HRMS_SNOWFLAKE_WORKER_ID: ${HRMS_SNOWFLAKE_WORKER_ID:-1}
      HRMS_SNOWFLAKE_DATACENTER_ID: ${HRMS_SNOWFLAKE_DATACENTER_ID:-1}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - hrms-net

  # ---------- Frontend (Nginx) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms-frontend
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - hrms-net

# ---------- Volumes ----------
volumes:
  pgdata:
    driver: local

# ---------- Networks ----------
networks:
  hrms-net:
    driver: bridge
