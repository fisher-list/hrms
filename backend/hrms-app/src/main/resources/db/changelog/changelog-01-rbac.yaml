              - column: { name: type, value: API }
              - column: { name: sort_no, valueNumeric: 20 }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
        - insert:
            tableName: sys_permission
            columns:
              - column: { name: id, valueNumeric: 1021 }
              - column: { name: code, value: "role:create" }
              - column: { name: name, value: "Create roles" }
