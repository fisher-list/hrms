              - column: { name: type, value: API }
              - column: { name: sort_no, valueNumeric: 22 }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
        - insert:
            tableName: sys_permission
            columns:
              - column: { name: id, valueNumeric: 1023 }
              - column: { name: code, value: "role:delete" }
              - column: { name: name, value: "Delete roles" }
              - column: { name: type, value: API }
              - column: { name: sort_no, valueNumeric: 23 }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
        # attendance permissions
        - insert:
