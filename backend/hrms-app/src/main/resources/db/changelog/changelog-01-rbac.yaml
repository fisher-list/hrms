databaseChangeLog:

  # ============================================================
  # 01-01 — sys_role table
  # ============================================================
  - changeSet:
      id: 01-01-create-sys-role
      author: dev-be
      comment: RBAC role table
      changes:
        - createTable:
            tableName: sys_role
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: timestamp }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              - column:
                  name: code
                  type: varchar(64)
                  constraints: { nullable: false }
              - column:
                  name: name
                  type: varchar(64)
                  constraints: { nullable: false }
              - column: { name: description, type: varchar(256) }
              - column:
                  name: builtin
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: true
                  constraints: { nullable: false }
      rollback:
        - dropTable:
            tableName: sys_role

  - changeSet:
      id: 01-02-sys-role-indexes
      author: dev-be
      changes:
        - addUniqueConstraint:
            tableName: sys_role
            columnNames: code
            constraintName: uk_role_code
      rollback:
        - dropUniqueConstraint:
            tableName: sys_role
            constraintName: uk_role_code

  # ============================================================
  # 01-03 — sys_permission table
  # ============================================================
  - changeSet:
      id: 01-03-create-sys-permission
      author: dev-be
      comment: RBAC permission table
      changes:
        - createTable:
            tableName: sys_permission
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: timestamp }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              - column:
                  name: code
                  type: varchar(128)
                  constraints: { nullable: false }
              - column:
                  name: name
                  type: varchar(128)
                  constraints: { nullable: false }
              - column:
                  name: type
                  type: varchar(16)
                  constraints: { nullable: false }
              - column: { name: parent_id, type: bigint }
              - column:
                  name: sort_no
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
      rollback:
        - dropTable:
            tableName: sys_permission

  - changeSet:
      id: 01-04-sys-permission-indexes
      author: dev-be
      changes:
        - addUniqueConstraint:
            tableName: sys_permission
            columnNames: code
            constraintName: uk_permission_code
      rollback:
        - dropUniqueConstraint:
            tableName: sys_permission
            constraintName: uk_permission_code

  # ============================================================
  # 01-05 — sys_user_role table
  # ============================================================
  - changeSet:
      id: 01-05-create-sys-user-role
      author: dev-be
      comment: User-role association table
      changes:
        - createTable:
            tableName: sys_user_role
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: timestamp }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              - column:
                  name: user_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: role_id
                  type: bigint
                  constraints: { nullable: false }
      rollback:
        - dropTable:
            tableName: sys_user_role

  - changeSet:
      id: 01-06-sys-user-role-indexes
      author: dev-be
      changes:
        - addUniqueConstraint:
            tableName: sys_user_role
            columnNames: user_id, role_id
            constraintName: uk_user_role
      rollback:
        - dropUniqueConstraint:
            tableName: sys_user_role
            constraintName: uk_user_role

  # ============================================================
  # 01-07 — sys_role_permission table
  # ============================================================
  - changeSet:
      id: 01-07-create-sys-role-permission
      author: dev-be
      comment: Role-permission association table
      changes:
        - createTable:
            tableName: sys_role_permission
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: timestamp }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              - column:
                  name: role_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: permission_id
                  type: bigint
                  constraints: { nullable: false }
      rollback:
        - dropTable:
            tableName: sys_role_permission

  - changeSet:
      id: 01-08-sys-role-permission-indexes
      author: dev-be
      changes:
        - addUniqueConstraint:
            tableName: sys_role_permission
            columnNames: role_id, permission_id
            constraintName: uk_role_permission
      rollback:
        - dropUniqueConstraint:
            tableName: sys_role_permission
            constraintName: uk_role_permission

  # ============================================================
  # 01-09 — seed roles
  # ============================================================
  - changeSet:
      id: 01-09-seed-roles
      author: dev-be
      comment: Seed 4 builtin roles
      changes:
        - insert:
            tableName: sys_role
            columns:
              - column: { name: id, valueNumeric: 100 }
              - column: { name: code, value: ADMIN }
              - column: { name: name, value: 系统管理员 }
              - column: { name: description, value: Super administrator with all permissions }
              - column: { name: builtin, valueBoolean: true }
              - column: { name: enabled, valueBoolean: true }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
        - insert:
            tableName: sys_role
            columns:
              - column: { name: id, valueNumeric: 101 }
              - column: { name: code, value: HR_MANAGER }
              - column: { name: name, value: HR经理 }
              - column: { name: description, value: HR manager with employee/org/attendance/payroll access }
              - column: { name: builtin, valueBoolean: true }
              - column: { name: enabled, valueBoolean: true }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
        - insert:
            tableName: sys_role
            columns:
              - column: { name: id, valueNumeric: 102 }
              - column: { name: code, value: LINE_MANAGER }
              - column: { name: name, value: 直线经理 }
              - column: { name: description, value: Line manager with limited employee view and attendance approval }
              - column: { name: builtin, valueBoolean: true }
              - column: { name: enabled, valueBoolean: true }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
        - insert:
            tableName: sys_role
            columns:
              - column: { name: id, valueNumeric: 103 }
              - column: { name: code, value: EMPLOYEE }
              - column: { name: name, value: 普通员工 }
              - column: { name: description, value: Regular employee with basic self-service access }
              - column: { name: builtin, valueBoolean: true }
              - column: { name: enabled, valueBoolean: true }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
      rollback:
        - delete:
            tableName: sys_role
            where: code IN ('ADMIN', 'HR_MANAGER', 'LINE_MANAGER', 'EMPLOYEE')

  # ============================================================
