            tableName: sys_permission
            columns:
              - column: { name: id, valueNumeric: 1050 }
              - column: { name: code, value: "recruit:view" }
              - column: { name: name, value: "View recruitment" }
              - column: { name: type, value: API }
              - column: { name: sort_no, valueNumeric: 50 }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
        - insert:
            tableName: sys_permission
            columns:
              - column: { name: id, valueNumeric: 1051 }
              - column: { name: code, value: "recruit:edit" }
              - column: { name: name, value: "Edit recruitment" }
              - column: { name: type, value: API }
              - column: { name: sort_no, valueNumeric: 51 }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
        # performance permissions
        - insert:
            tableName: sys_permission
            columns:
              - column: { name: id, valueNumeric: 1060 }
              - column: { name: code, value: "performance:view" }
              - column: { name: name, value: "View performance" }
              - column: { name: type, value: API }
              - column: { name: sort_no, valueNumeric: 60 }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
        - insert:
            tableName: sys_permission
            columns:
              - column: { name: id, valueNumeric: 1061 }
              - column: { name: code, value: "performance:edit" }
              - column: { name: name, value: "Edit performance" }
              - column: { name: type, value: API }
              - column: { name: sort_no, valueNumeric: 61 }
