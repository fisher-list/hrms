            tableName: sys_permission
            where: "code LIKE 'employee:%' OR code LIKE 'org:%' OR code LIKE 'role:%' OR code LIKE 'attendance:%' OR code LIKE 'payroll:%' OR code LIKE 'recruit:%' OR code LIKE 'performance:%'"

  # ============================================================
  # 01-11 — seed admin user-role (admin id=1, ADMIN role id=100)
  # ============================================================
  - changeSet:
      id: 01-11-seed-admin-user-role
      author: dev-be
      comment: Assign ADMIN role to admin user
      changes:
        - insert:
            tableName: sys_user_role
            columns:
              - column: { name: id, valueNumeric: 10000 }
              - column: { name: user_id, valueNumeric: 1 }
              - column: { name: role_id, valueNumeric: 100 }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
      rollback:
        - delete:
            tableName: sys_user_role
            where: user_id = 1 AND role_id = 100

  # ============================================================
  # 01-12 — seed role-permission mappings
  # ADMIN (100) gets ALL permissions
  # HR_MANAGER (101) gets employee:*, org:view, attendance:*, payroll:*
  # LINE_MANAGER (102) gets employee:view, attendance:view, attendance:approve
  # EMPLOYEE (103) gets attendance:view
  # ============================================================
  - changeSet:
      id: 01-12-seed-role-permission
      author: dev-be
      comment: Seed role-permission mappings
      changes:
        # ADMIN -> all permissions (1000-1061)
        - sql:
            sql: >
              INSERT INTO sys_role_permission (id, role_id, permission_id, deleted, version, tenant_id)
              SELECT id + 20000, 100, id, false, 0, 1
              FROM sys_permission WHERE deleted = false
        # HR_MANAGER -> employee:*, org:view, attendance:*, payroll:*
        - sql:
            sql: >
              INSERT INTO sys_role_permission (id, role_id, permission_id, deleted, version, tenant_id)
              SELECT id + 30000, 101, id, false, 0, 1
              FROM sys_permission
              WHERE deleted = false AND (
                code LIKE 'employee:%'
                OR code = 'org:view'
                OR code LIKE 'attendance:%'
                OR code LIKE 'payroll:%'
              )
        # LINE_MANAGER -> employee:view, attendance:view, attendance:approve
        - sql:
            sql: >
              INSERT INTO sys_role_permission (id, role_id, permission_id, deleted, version, tenant_id)
              SELECT id + 40000, 102, id, false, 0, 1
              FROM sys_permission
              WHERE deleted = false AND code IN ('employee:view', 'attendance:view', 'attendance:approve')
        # EMPLOYEE -> attendance:view
        - sql:
            sql: >
              INSERT INTO sys_role_permission (id, role_id, permission_id, deleted, version, tenant_id)
              SELECT id + 50000, 103, id, false, 0, 1
              FROM sys_permission
              WHERE deleted = false AND code = 'attendance:view'
      rollback:
        - delete:
            tableName: sys_role_permission
            where: role_id IN (100, 101, 102, 103)

  # ============================================================
  # 01-13 — add data_scope column to sys_role
  # ============================================================
  - changeSet:
      id: 01-13-add-data-scope-column
      author: dev-be
      comment: Add data_scope column to sys_role for row-level data filtering
      changes:
        - addColumn:
            tableName: sys_role
            columns:
              - column:
                  name: data_scope
                  type: varchar(32)
                  defaultValue: SELF_ONLY
                  constraints: { nullable: false }
      rollback:
        - dropColumn:
            tableName: sys_role
            columnName: data_scope

  # ============================================================
  # 01-14 — set data_scope for builtin roles
  # ============================================================
  - changeSet:
      id: 01-14-seed-role-data-scope
      author: dev-be
      comment: Set data_scope for builtin roles
      changes:
        - update:
            tableName: sys_role
            columns:
              - column: { name: data_scope, value: ALL }
            where: code = 'ADMIN'
        - update:
            tableName: sys_role
            columns:
              - column: { name: data_scope, value: ALL }
            where: code = 'HR_MANAGER'
        - update:
            tableName: sys_role
            columns:
              - column: { name: data_scope, value: SUBORDINATE_TREE }
            where: code = 'LINE_MANAGER'
        - update:
            tableName: sys_role
            columns:
              - column: { name: data_scope, value: SELF_ONLY }
            where: code = 'EMPLOYEE'
      rollback:
        - update:
            tableName: sys_role
            columns:
              - column: { name: data_scope, value: SELF_ONLY }
