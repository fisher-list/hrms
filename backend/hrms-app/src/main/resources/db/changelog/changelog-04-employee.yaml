  # ============================================================
  # 04-21 — BizCode: add employee domain error codes (3xxx)
  # ============================================================
  # Note: BizCode constants are added in Java source, not in DB.
  # This changeset is a placeholder comment for tracking.

  # ============================================================
  # 04-22 — seed approval definitions (HR_HIRE_FORM, HR_TRANSFER_FORM, HR_TERMINATION_FORM)
  # ============================================================
  - changeSet:
      id: 04-22-seed-hr-approval-definitions
      author: dev-be
      comment: Seed HR approval definitions for hire/transfer/termination forms
      changes:
        - insert:
            tableName: approval_definition
            columns:
              - column: { name: id, valueNumeric: 200 }
              - column: { name: code, value: HR_HIRE_FORM }
              - column: { name: name, value: "Hire Form Approval" }
              - column: { name: business_type, value: HR_HIRE }
              - column:
                  name: nodes
                  value: '[{"seq":1,"name":"Admin审批","approverRule":"ROLE:ADMIN"}]'
              - column: { name: enabled, valueBoolean: true }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
        - insert:
            tableName: approval_definition
            columns:
              - column: { name: id, valueNumeric: 201 }
              - column: { name: code, value: HR_TRANSFER_FORM }
              - column: { name: name, value: "Transfer Form Approval" }
              - column: { name: business_type, value: HR_TRANSFER }
              - column:
                  name: nodes
                  value: '[{"seq":1,"name":"直属经理审批","approverRule":"EMP_MANAGER"},{"seq":2,"name":"HR经理审批","approverRule":"ROLE:HR_MANAGER"}]'
              - column: { name: enabled, valueBoolean: true }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
        - insert:
            tableName: approval_definition
            columns:
              - column: { name: id, valueNumeric: 202 }
              - column: { name: code, value: HR_TERMINATION_FORM }
              - column: { name: name, value: "Termination Form Approval" }
              - column: { name: business_type, value: HR_TERMINATION }
              - column:
                  name: nodes
                  value: '[{"seq":1,"name":"HR经理审批","approverRule":"ROLE:HR_MANAGER"}]'
              - column: { name: enabled, valueBoolean: true }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
      rollback:
