databaseChangeLog:

  # ============================================================
  # 04-01 — hr_employee master table
  # ============================================================
  - changeSet:
      id: 04-01-create-hr-employee
      author: dev-be
      comment: Employee master table
      changes:
        - createTable:
            tableName: hr_employee
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: datetime }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              # domain columns
              - column:
                  name: emp_no
                  type: varchar(20)
                  constraints: { nullable: false }
              - column:
                  name: name
                  type: varchar(50)
                  constraints: { nullable: false }
              - column: { name: gender, type: "char(1)" }
              - column: { name: birth_date, type: date }
              - column: { name: id_card_enc, type: text }
              - column: { name: phone_enc, type: text }
              - column: { name: email, type: varchar(100) }
              - column: { name: dept_id, type: bigint }
              - column: { name: position_id, type: bigint }
              - column: { name: hire_date, type: date }
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: PENDING_HIRE
                  constraints: { nullable: false }
              - column: { name: contract_start, type: date }
              - column: { name: contract_end, type: date }
              - column: { name: probation_end, type: date }
              - column: { name: emergency_contact, type: varchar(50) }
              - column: { name: emergency_phone_enc, type: text }
      rollback:
        - dropTable:
            tableName: hr_employee

  - changeSet:
      id: 04-02-hr-employee-indexes
      author: dev-be
      changes:
        - addUniqueConstraint:
            tableName: hr_employee
            columnNames: emp_no
            constraintName: uk_employee_emp_no
        - createIndex:
            tableName: hr_employee
            indexName: idx_employee_dept
            columns:
              - column: { name: dept_id }
        - createIndex:
            tableName: hr_employee
            indexName: idx_employee_position
            columns:
              - column: { name: position_id }
        - createIndex:
            tableName: hr_employee
            indexName: idx_employee_status
            columns:
              - column: { name: status }
      rollback:
        - dropUniqueConstraint:
            tableName: hr_employee
            constraintName: uk_employee_emp_no
        - dropIndex:
            tableName: hr_employee
            indexName: idx_employee_dept
        - dropIndex:
            tableName: hr_employee
            indexName: idx_employee_position
        - dropIndex:
            tableName: hr_employee
            indexName: idx_employee_status

  - changeSet:
      id: 04-15-add-hr-employee-id-card-hash
      author: codex
      comment: Add keyed hash for ID card duplicate checks while keeping AES-GCM randomized
      changes:
        - addColumn:
            tableName: hr_employee
            columns:
              - column:
                  name: id_card_hash
                  type: varchar(64)
        - addUniqueConstraint:
            tableName: hr_employee
            columnNames: id_card_hash
            constraintName: uk_employee_id_card_hash
      rollback:
        - dropUniqueConstraint:
            tableName: hr_employee
            constraintName: uk_employee_id_card_hash
        - dropColumn:
            tableName: hr_employee
            columnName: id_card_hash

  # ============================================================
  # 04-03 — hr_employee_education
