  # ============================================================
  # 04-24 — assign HR permissions to ADMIN role
  # ============================================================
  - changeSet:
      id: 04-24-seed-hr-role-permission
      author: dev-be
      comment: Assign HR permissions to ADMIN role
      changes:
        - sql:
            sql: >
              INSERT INTO sys_role_permission (id, role_id, permission_id, deleted, version, tenant_id)
              SELECT id + 70000, 100, id, false, 0, 1
              FROM sys_permission
              WHERE deleted = false AND code LIKE 'hr:%'
      rollback:
        - sql:
            sql: >
              DELETE FROM sys_role_permission
              WHERE permission_id IN (SELECT id FROM sys_permission WHERE code LIKE 'hr:%')

