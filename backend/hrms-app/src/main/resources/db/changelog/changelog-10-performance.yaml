              - column:
                  name: status
                  type: varchar(10)
                  defaultValue: DRAFT
                  constraints: { nullable: false }
              - column:
                  name: sort_order
                  type: int
                  defaultValueNumeric: 0
      rollback:
        - dropTable:
            tableName: pf_goal

  - changeSet:
      id: 10-08-pf-goal-index
      author: dev-be
      changes:
        - createIndex:
            tableName: pf_goal
            indexName: idx_goal_appraisal
            columns:
              - column: { name: appraisal_id }
      rollback:
        - dropIndex:
            tableName: pf_goal
            indexName: idx_goal_appraisal

  # ============================================================
