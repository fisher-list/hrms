databaseChangeLog:

  # ============================================================
  # 10-01 — pf_cycle
  # ============================================================
  - changeSet:
      id: 10-01-create-pf-cycle
      author: dev-be
      comment: Performance cycle table
      changes:
        - createTable:
            tableName: pf_cycle
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: datetime }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              # domain columns
              - column:
                  name: name
                  type: varchar(50)
                  constraints: { nullable: false }
              - column:
                  name: start_date
                  type: date
                  constraints: { nullable: false }
              - column:
                  name: end_date
                  type: date
                  constraints: { nullable: false }
              - column:
                  name: status
                  type: varchar(10)
                  defaultValue: DRAFT
                  constraints: { nullable: false }
              - column:
                  name: scope_type
                  type: varchar(10)
                  defaultValue: ALL
                  constraints: { nullable: false }
              - column:
                  name: scope_depts
                  type: text
      rollback:
        - dropTable:
            tableName: pf_cycle

  # ============================================================
  # 10-02 — pf_template
  # ============================================================
  - changeSet:
      id: 10-02-create-pf-template
      author: dev-be
      comment: Performance template table
      changes:
        - createTable:
            tableName: pf_template
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: datetime }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              # domain columns
              - column:
                  name: name
                  type: varchar(50)
                  constraints: { nullable: false }
              - column:
                  name: description
                  type: text
      rollback:
        - dropTable:
            tableName: pf_template

  # ============================================================
  # 10-03 — pf_scoring_item
  # ============================================================
  - changeSet:
      id: 10-03-create-pf-scoring-item
      author: dev-be
      comment: Performance scoring item table
      changes:
        - createTable:
            tableName: pf_scoring_item
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: datetime }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              # domain columns
              - column:
                  name: template_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: name
                  type: varchar(100)
                  constraints: { nullable: false }
              - column:
                  name: weight
                  type: int
                  constraints: { nullable: false }
              - column:
                  name: min_score
                  type: int
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              - column:
                  name: max_score
                  type: int
                  defaultValueNumeric: 5
                  constraints: { nullable: false }
              - column:
                  name: sort_order
                  type: int
                  defaultValueNumeric: 0
      rollback:
        - dropTable:
            tableName: pf_scoring_item

  - changeSet:
      id: 10-04-pf-scoring-item-index
      author: dev-be
      changes:
        - createIndex:
            tableName: pf_scoring_item
            indexName: idx_scoring_item_template
            columns:
              - column: { name: template_id }
      rollback:
        - dropIndex:
            tableName: pf_scoring_item
            indexName: idx_scoring_item_template

  # ============================================================
  # 10-05 — pf_appraisal
  # ============================================================
  - changeSet:
      id: 10-05-create-pf-appraisal
      author: dev-be
      comment: Performance appraisal table
      changes:
        - createTable:
            tableName: pf_appraisal
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: datetime }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              # domain columns
              - column:
                  name: cycle_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: template_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: employee_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: DRAFT
                  constraints: { nullable: false }
              - column:
                  name: self_score
                  type: "decimal(5,2)"
              - column:
                  name: manager_score
                  type: "decimal(5,2)"
              - column:
                  name: final_score
                  type: "decimal(5,2)"
      rollback:
        - dropTable:
            tableName: pf_appraisal

  - changeSet:
      id: 10-06-pf-appraisal-indexes
      author: dev-be
      changes:
        - createIndex:
            tableName: pf_appraisal
            indexName: idx_appraisal_cycle
            columns:
              - column: { name: cycle_id }
        - createIndex:
            tableName: pf_appraisal
            indexName: idx_appraisal_emp
            columns:
              - column: { name: employee_id }
        - addUniqueConstraint:
            tableName: pf_appraisal
            columnNames: cycle_id, employee_id, tenant_id
            constraintName: uk_appraisal_cycle_emp
      rollback:
        - dropIndex:
            tableName: pf_appraisal
            indexName: idx_appraisal_cycle
        - dropIndex:
            tableName: pf_appraisal
            indexName: idx_appraisal_emp
        - dropUniqueConstraint:
            tableName: pf_appraisal
            constraintName: uk_appraisal_cycle_emp

  # ============================================================
  # 10-07 — pf_goal
  # ============================================================
  - changeSet:
      id: 10-07-create-pf-goal
      author: dev-be
      comment: Performance goal table
      changes:
        - createTable:
            tableName: pf_goal
            columns:
              - column:
