  # ============================================================
  # 10-13 — Seed standard performance template
  # ============================================================
  - changeSet:
      id: 10-13-seed-pf-template
      author: dev-be
      comment: Seed standard performance template with 3 scoring items
      context: seed
      changes:
        - insert:
            tableName: pf_template
            columns:
              - column: { name: id, valueNumeric: 901 }
              - column: { name: name, value: "标准绩效模板" }
              - column: { name: description, value: "适用于全公司员工的标准绩效评估模板" }
        - insert:
            tableName: pf_scoring_item
            columns:
              - column: { name: id, valueNumeric: 911 }
              - column: { name: template_id, valueNumeric: 901 }
              - column: { name: name, value: "工作质量" }
              - column: { name: weight, valueNumeric: 40 }
              - column: { name: min_score, valueNumeric: 1 }
              - column: { name: max_score, valueNumeric: 5 }
              - column: { name: sort_order, valueNumeric: 1 }
        - insert:
            tableName: pf_scoring_item
            columns:
              - column: { name: id, valueNumeric: 912 }
              - column: { name: template_id, valueNumeric: 901 }
              - column: { name: name, value: "团队协作" }
              - column: { name: weight, valueNumeric: 30 }
              - column: { name: min_score, valueNumeric: 1 }
              - column: { name: max_score, valueNumeric: 5 }
              - column: { name: sort_order, valueNumeric: 2 }
        - insert:
            tableName: pf_scoring_item
            columns:
              - column: { name: id, valueNumeric: 913 }
              - column: { name: template_id, valueNumeric: 901 }
              - column: { name: name, value: "创新能力" }
              - column: { name: weight, valueNumeric: 30 }
              - column: { name: min_score, valueNumeric: 1 }
              - column: { name: max_score, valueNumeric: 5 }
              - column: { name: sort_order, valueNumeric: 3 }
      rollback:
        - delete:
            tableName: pf_scoring_item
            where: "id BETWEEN 911 AND 913"
        - delete:
            tableName: pf_template
            where: "id = 901"

  # ============================================================
  # 10-14 — Seed performance permissions
  # ============================================================
  - changeSet:
      id: 10-14-seed-pf-permissions
      author: dev-be
      comment: Insert performance module permissions
      context: seed
      changes:
        - insert:
            tableName: sys_permission
            columns:
              - column: { name: id, valueNumeric: 921 }
              - column: { name: code, value: "pf:cycle:edit" }
              - column: { name: name, value: "编辑绩效周期" }
              - column: { name: type, value: "button" }
        - insert:
            tableName: sys_permission
            columns:
