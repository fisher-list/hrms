            tableName: at_leave_type
            where: "id BETWEEN 6001 AND 6008"

  # ============================================================
  # 06-12 — Seed initial leave balances for 20 employees (year 2026)
  # Uses SQL to insert ANNUAL(20), SICK(15), PERSONAL(10) for all 20 employees
  # ============================================================
  - changeSet:
      id: 06-12-seed-leave-balances
      author: dev-be
      comment: Seed initial leave balances for 20 employees for year 2026
      context: seed
      dbms: postgresql
      changes:
        - sql:
            sql: >
              INSERT INTO at_leave_balance (id, employee_id, leave_type_id, year, quota, used, remaining, created_at, version, deleted, tenant_id)
              SELECT
                (61000 + (e.id - 50000) * 10 + lt.offset) AS id,
                e.id AS employee_id,
                lt.type_id AS leave_type_id,
                2026 AS year,
                lt.quota AS quota,
                0 AS used,
                lt.quota AS remaining,
                NOW() AS created_at,
                0 AS version,
                false AS deleted,
                1 AS tenant_id
              FROM (
                SELECT id FROM hr_employee WHERE deleted = false AND id BETWEEN 50001 AND 50020
              ) e
              CROSS JOIN (
                SELECT 6001 AS type_id, 1 AS offset, 20.0 AS quota UNION ALL
                SELECT 6002, 2, 15.0 UNION ALL
                SELECT 6003, 3, 10.0 UNION ALL
                SELECT 6004, 4, 0.0 UNION ALL
                SELECT 6005, 5, 0.0 UNION ALL
                SELECT 6006, 6, 0.0 UNION ALL
                SELECT 6007, 7, 0.0 UNION ALL
                SELECT 6008, 8, 0.0
              ) lt
              ON CONFLICT DO NOTHING
      rollback:
        - sql:
            sql: "DELETE FROM at_leave_balance WHERE year = 2026 AND employee_id BETWEEN 50001 AND 50020"

  # ============================================================
  # 06-13 — Seed approval definitions for leave and overtime
  # ============================================================
  - changeSet:
