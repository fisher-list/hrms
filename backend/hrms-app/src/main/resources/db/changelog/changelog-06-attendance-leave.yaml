              - column: { name: balance_unit, value: "DAY" }
              - column: { name: carry_over_rule, value: "CARRY_MAX5" }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: tenant_id, valueNumeric: 1 }
        - insert:
            tableName: at_leave_type
            columns:
