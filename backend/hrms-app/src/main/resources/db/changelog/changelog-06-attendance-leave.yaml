        - insert:
            tableName: sys_role_permission
            columns:
              - column: { name: id, valueNumeric: 90013 }
              - column: { name: role_id, valueNumeric: 1 }
              - column: { name: permission_id, valueNumeric: 606 }
        - insert:
            tableName: sys_role_permission
