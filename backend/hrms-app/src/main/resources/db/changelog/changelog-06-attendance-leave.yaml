              - column: { name: name, value: "请假审批" }
              - column: { name: business_type, value: "AT_LEAVE_REQUEST" }
              - column:
                  name: nodes
                  value: '[{"seq":1,"name":"管理员审批","approverRule":"ROLE:ADMIN"}]'
              - column: { name: enabled, valueBoolean: true }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
        - insert:
            tableName: approval_definition
            columns:
              - column: { name: id, valueNumeric: 6002 }
              - column: { name: code, value: "AT_OVERTIME_REQUEST" }
              - column: { name: name, value: "加班审批" }
              - column: { name: business_type, value: "AT_OVERTIME_REQUEST" }
              - column:
                  name: nodes
                  value: '[{"seq":1,"name":"管理员审批","approverRule":"ROLE:ADMIN"}]'
              - column: { name: enabled, valueBoolean: true }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
      rollback:
        - delete:
            tableName: approval_definition
            where: "code IN ('AT_LEAVE_REQUEST', 'AT_OVERTIME_REQUEST')"

