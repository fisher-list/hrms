databaseChangeLog:

  # ============================================================
  # 06-01 — at_leave_type (Leave type catalog)
  # ============================================================
  - changeSet:
      id: 06-01-create-at-leave-type
      author: dev-be
      comment: Leave type catalog table
      changes:
        - createTable:
            tableName: at_leave_type
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: datetime }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              # domain columns
              - column:
                  name: code
                  type: varchar(20)
                  constraints: { nullable: false }
              - column:
                  name: name
                  type: varchar(50)
                  constraints: { nullable: false }
              - column:
                  name: is_paid
                  type: boolean
                  defaultValueBoolean: true
              - column:
                  name: annual_quota
                  type: "decimal(5,1)"
                  defaultValueNumeric: 0
              - column:
                  name: balance_unit
                  type: varchar(10)
                  defaultValue: DAY
              - column:
                  name: carry_over_rule
                  type: varchar(20)
                  defaultValue: NONE
      rollback:
        - dropTable:
            tableName: at_leave_type

  - changeSet:
      id: 06-02-at-leave-type-indexes
      author: dev-be
      changes:
        - addUniqueConstraint:
            tableName: at_leave_type
            columnNames: code, tenant_id
            constraintName: uk_leave_type_code
      rollback:
        - dropUniqueConstraint:
            tableName: at_leave_type
            constraintName: uk_leave_type_code

  # ============================================================
  # 06-03 — at_leave_balance (Leave balance)
  # ============================================================
  - changeSet:
      id: 06-03-create-at-leave-balance
      author: dev-be
      comment: Leave balance table
      changes:
        - createTable:
            tableName: at_leave_balance
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: datetime }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              # domain columns
              - column:
                  name: employee_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: leave_type_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: year
                  type: int
                  constraints: { nullable: false }
              - column:
                  name: quota
                  type: "decimal(5,1)"
                  defaultValueNumeric: 0
              - column:
                  name: used
                  type: "decimal(5,1)"
                  defaultValueNumeric: 0
              - column:
                  name: remaining
                  type: "decimal(5,1)"
                  defaultValueNumeric: 0
      rollback:
        - dropTable:
            tableName: at_leave_balance

  - changeSet:
      id: 06-04-at-leave-balance-indexes
      author: dev-be
      changes:
        - addUniqueConstraint:
            tableName: at_leave_balance
            columnNames: employee_id, leave_type_id, year, tenant_id
            constraintName: uk_balance_emp_type_year
      rollback:
        - dropUniqueConstraint:
            tableName: at_leave_balance
            constraintName: uk_balance_emp_type_year

  # ============================================================
  # 06-05 — at_leave_request (Leave request)
  # ============================================================
  - changeSet:
      id: 06-05-create-at-leave-request
      author: dev-be
      comment: Leave request table
      changes:
        - createTable:
            tableName: at_leave_request
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: datetime }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              # domain columns
              - column:
                  name: employee_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: leave_type_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: start_date
                  type: date
                  constraints: { nullable: false }
              - column:
                  name: end_date
                  type: date
                  constraints: { nullable: false }
              - column:
                  name: days
                  type: "decimal(4,1)"
                  constraints: { nullable: false }
              - column:
