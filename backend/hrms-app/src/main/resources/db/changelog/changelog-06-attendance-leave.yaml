              - column: { name: start_date }
              - column: { name: end_date }
      rollback:
        - dropIndex:
            tableName: at_leave_request
            indexName: idx_leave_req_employee
        - dropIndex:
            tableName: at_leave_request
            indexName: idx_leave_req_dates

