databaseChangeLog:

  # ============================================================
  # 00-01 — sys_user table (BaseEntity columns first, then domain)
  # ============================================================
  - changeSet:
      id: 00-01-create-sys-user
      author: dev-be
      comment: System user table
      changes:
        - createTable:
            tableName: sys_user
            columns:
              # BaseEntity columns
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: timestamp }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              # domain columns
              - column:
                  name: username
                  type: varchar(64)
                  constraints: { nullable: false }
              - column:
                  name: password_hash
                  type: varchar(128)
                  constraints: { nullable: false }
              - column: { name: nickname, type: varchar(64) }
              - column: { name: email, type: varchar(128) }
              - column: { name: phone, type: varchar(32) }
              - column:
                  name: status
                  type: varchar(16)
                  defaultValue: ACTIVE
                  constraints: { nullable: false }
              - column: { name: last_login_at, type: timestamp }
              - column: { name: last_login_ip, type: varchar(64) }
              - column:
                  name: failed_attempts
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column: { name: locked_until, type: timestamp }
              - column: { name: password_changed_at, type: timestamp }
      rollback:
        - dropTable:
            tableName: sys_user

  - changeSet:
      id: 00-02-sys-user-indexes
      author: dev-be
      changes:
        - addUniqueConstraint:
            tableName: sys_user
            columnNames: username
            constraintName: uk_user_username
        - createIndex:
            tableName: sys_user
            indexName: idx_user_status
            columns:
              - column: { name: status }
      rollback:
        - dropIndex:
            tableName: sys_user
            indexName: idx_user_status
        - dropUniqueConstraint:
            tableName: sys_user
            constraintName: uk_user_username

  # ============================================================
  # 00-03 — sys_user_token table (refresh-token registry)
  # ============================================================
  - changeSet:
      id: 00-03-create-sys-user-token
      author: dev-be
      comment: Refresh-token registry / blacklist
      changes:
        - createTable:
            tableName: sys_user_token
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: timestamp }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              - column:
                  name: user_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: refresh_jti
                  type: varchar(64)
                  constraints: { nullable: false }
              - column: { name: refresh_token_hash, type: varchar(128) }
              - column: { name: device, type: varchar(128) }
              - column: { name: ip, type: varchar(64) }
              - column: { name: issued_at, type: timestamp }
              - column: { name: expires_at, type: timestamp }
              - column:
                  name: revoked
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column: { name: revoked_at, type: timestamp }
      rollback:
        - dropTable:
            tableName: sys_user_token

  - changeSet:
      id: 00-04-sys-user-token-indexes
      author: dev-be
      changes:
        - addUniqueConstraint:
            tableName: sys_user_token
            columnNames: refresh_jti
            constraintName: uk_token_refresh_jti
        - createIndex:
            tableName: sys_user_token
            indexName: idx_token_user_revoked
            columns:
              - column: { name: user_id }
              - column: { name: revoked }
        - createIndex:
            tableName: sys_user_token
            indexName: idx_token_expires
            columns:
              - column: { name: expires_at }
      rollback:
        - dropIndex:
            tableName: sys_user_token
            indexName: idx_token_expires
        - dropIndex:
            tableName: sys_user_token
            indexName: idx_token_user_revoked
        - dropUniqueConstraint:
            tableName: sys_user_token
            constraintName: uk_token_refresh_jti

  # ============================================================
  # 00-05 — seed admin row.  password_hash uses a placeholder; the
  # application's AdminBootstrapRunner replaces it with a real
  # BCrypt(Admin@2026) hash on first start so we never check a real
  # hash into VCS and the seed remains dbms-neutral.
  # ============================================================
  - changeSet:
      id: 00-05-seed-admin
      author: dev-be
      comment: Seed default admin user (password is set to BCrypt(Admin@2026) by AdminBootstrapRunner)
      changes:
        - insert:
            tableName: sys_user
            columns:
              - column: { name: id, valueNumeric: 1 }
              - column: { name: username, value: admin }
              - column: { name: password_hash, value: '__BOOTSTRAP_PLACEHOLDER__' }
              - column: { name: nickname, value: 系统管理员 }
              - column: { name: status, value: ACTIVE }
              - column: { name: failed_attempts, valueNumeric: 0 }
              - column: { name: deleted, valueBoolean: false }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: tenant_id, valueNumeric: 1 }
      rollback:
        - delete:
            tableName: sys_user
            where: username = 'admin'

  - changeSet:
      id: 00-06-add-user-employee-link
      author: codex
      comment: Link login accounts to employee profiles for self-service data scoping
      changes:
        - addColumn:
            tableName: sys_user
            columns:
              - column:
                  name: employee_id
                  type: bigint
        - createIndex:
            tableName: sys_user
            indexName: idx_user_employee
            columns:
              - column: { name: employee_id }
      rollback:
        - dropIndex:
            tableName: sys_user
            indexName: idx_user_employee
        - dropColumn:
            tableName: sys_user
            columnName: employee_id
