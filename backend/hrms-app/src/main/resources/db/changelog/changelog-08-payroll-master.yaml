databaseChangeLog:

  # ============================================================
  # 08-01 — py_compensation_master
  # ============================================================
  - changeSet:
      id: 08-01-create-py-compensation-master
      author: dev-be
      comment: Compensation master table
      changes:
        - createTable:
            tableName: py_compensation_master
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: datetime }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              # domain columns
              - column:
                  name: employee_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: base_salary
                  type: "decimal(18,4)"
              - column:
                  name: position_salary
                  type: "decimal(18,4)"
              - column:
                  name: performance_base
                  type: "decimal(18,4)"
              - column:
                  name: allowance
                  type: "decimal(18,4)"
              - column:
                  name: effective_date
                  type: date
                  constraints: { nullable: false }
      rollback:
        - dropTable:
            tableName: py_compensation_master

  - changeSet:
      id: 08-02-py-compensation-master-indexes
      author: dev-be
      changes:
        - createIndex:
            tableName: py_compensation_master
            indexName: idx_compensation_emp
            columns:
              - column: { name: employee_id }
      rollback:
        - dropIndex:
            tableName: py_compensation_master
            indexName: idx_compensation_emp

  # ============================================================
  # 08-03 — py_payroll_period
  # ============================================================
  - changeSet:
      id: 08-03-create-py-payroll-period
      author: dev-be
      comment: Payroll period table
      changes:
        - createTable:
            tableName: py_payroll_period
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: datetime }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              # domain columns
              - column:
                  name: period_month
                  type: varchar(7)
                  constraints: { nullable: false }
              - column:
                  name: status
                  type: varchar(10)
                  defaultValue: DRAFT
      rollback:
        - dropTable:
            tableName: py_payroll_period

  - changeSet:
      id: 08-04-py-payroll-period-unique
      author: dev-be
      changes:
        - addUniqueConstraint:
            tableName: py_payroll_period
            columnNames: period_month, tenant_id
            constraintName: uk_period_month
      rollback:
        - dropUniqueConstraint:
            tableName: py_payroll_period
            constraintName: uk_period_month

  # ============================================================
  # 08-05 — py_payroll_run
  # ============================================================
  - changeSet:
      id: 08-05-create-py-payroll-run
      author: dev-be
      comment: Payroll run table
      changes:
        - createTable:
            tableName: py_payroll_run
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: datetime }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              # domain columns
              - column:
                  name: period_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: run_type
                  type: varchar(10)
                  defaultValue: NORMAL
              - column:
                  name: status
                  type: varchar(15)
                  defaultValue: DRAFT
              - column:
                  name: reverse_of_run_id
                  type: bigint
              - column:
                  name: employee_count
                  type: int
                  defaultValueNumeric: 0
              - column:
                  name: total_gross
                  type: "decimal(18,4)"
                  defaultValueNumeric: 0
              - column:
                  name: total_net
                  type: "decimal(18,4)"
                  defaultValueNumeric: 0
      rollback:
        - dropTable:
            tableName: py_payroll_run

  # ============================================================
  # 08-06 — py_payroll_detail
  # ============================================================
  - changeSet:
      id: 08-06-create-py-payroll-detail
      author: dev-be
      comment: Payroll detail table
      changes:
        - createTable:
            tableName: py_payroll_detail
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: created_at
                  type: datetime
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column: { name: updated_at, type: datetime }
              - column: { name: created_by, type: bigint }
              - column: { name: updated_by, type: bigint }
              - column:
                  name: deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints: { nullable: false }
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints: { nullable: false }
              - column:
                  name: tenant_id
                  type: bigint
                  defaultValueNumeric: 1
                  constraints: { nullable: false }
              # domain columns
              - column:
                  name: run_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: employee_id
                  type: bigint
                  constraints: { nullable: false }
              - column:
                  name: employee_name
                  type: varchar(50)
              - column:
                  name: emp_no
                  type: varchar(20)
              - column:
                  name: gross_pay
                  type: "decimal(18,4)"
              - column:
                  name: social_insurance
                  type: "decimal(18,4)"
              - column:
                  name: housing_fund
                  type: "decimal(18,4)"
              - column:
                  name: iit
                  type: "decimal(18,4)"
              - column:
                  name: net_pay
                  type: "decimal(18,4)"
              - column:
                  name: is_exception
                  type: boolean
                  defaultValueBoolean: false
      rollback:
        - dropTable:
            tableName: py_payroll_detail

  - changeSet:
      id: 08-07-py-payroll-detail-indexes
      author: dev-be
      changes:
        - createIndex:
            tableName: py_payroll_detail
            indexName: idx_detail_run
            columns:
              - column: { name: run_id }
        - createIndex:
            tableName: py_payroll_detail
            indexName: idx_detail_emp
            columns:
              - column: { name: employee_id }
      rollback:
        - dropIndex:
            tableName: py_payroll_detail
            indexName: idx_detail_run
        - dropIndex:
            tableName: py_payroll_detail
            indexName: idx_detail_emp

  # ============================================================
  # 08-08 — py_iit_bracket
  # ============================================================
  - changeSet:
      id: 08-08-create-py-iit-bracket
      author: dev-be
      comment: IIT progressive tax bracket table
      changes:
        - createTable:
            tableName: py_iit_bracket
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: lower_limit
                  type: "decimal(18,2)"
              - column:
                  name: upper_limit
                  type: "decimal(18,2)"
              - column:
                  name: rate
                  type: "decimal(5,4)"
              - column:
                  name: quick_deduction
                  type: "decimal(18,2)"
      rollback:
        - dropTable:
            tableName: py_iit_bracket

  # ============================================================
  # 08-09 — py_social_insurance_rate
  # ============================================================
  - changeSet:
      id: 08-09-create-py-social-insurance-rate
      author: dev-be
      comment: Social insurance and housing fund rate table
      changes:
        - createTable:
            tableName: py_social_insurance_rate
            columns:
              - column:
                  name: id
                  type: bigint
                  constraints: { primaryKey: true, nullable: false }
              - column:
                  name: pension_personal
                  type: "decimal(5,4)"
                  defaultValueNumeric: 0.08
              - column:
                  name: pension_company
                  type: "decimal(5,4)"
                  defaultValueNumeric: 0.16
              - column:
                  name: medical_personal
                  type: "decimal(5,4)"
                  defaultValueNumeric: 0.02
              - column:
                  name: medical_fixed_fee
                  type: "decimal(18,2)"
                  defaultValueNumeric: 3.00
              - column:
                  name: medical_company
                  type: "decimal(5,4)"
                  defaultValueNumeric: 0.098
              - column:
                  name: unemployment_personal
                  type: "decimal(5,4)"
                  defaultValueNumeric: 0.005
              - column:
                  name: unemployment_company
