        - createIndex:
            tableName: py_bank_payment_detail
            indexName: idx_payment_detail_emp
            columns:
              - column: { name: employee_id }
      rollback:
        - dropIndex:
            tableName: py_bank_payment_detail
            indexName: idx_payment_detail_batch
        - dropIndex:
            tableName: py_bank_payment_detail
            indexName: idx_payment_detail_emp

  # ============================================================
